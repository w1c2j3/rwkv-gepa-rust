name = "open_qa"

[generation]
template = '''
你要基于给定的原始 user prompt，生成 {{variant_count}} 条新的训练样本。

目标：
生成的新样本必须与原样本保持相同的任务类型、语言风格、难度层级和作答方式，但不能只是原句的同义改写、语序调整、浅层替换或局部扰动。
新样本应与原样本属于同一类开放式任务，但在题目对象、输入材料、约束条件、测试重点、求解路径、适用场景或边界条件上，至少有一处本质变化。

硬性要求：
1. 输出的是新的 user prompt，并同时给出该题对应的标准答案 answer；不要输出 assistant answer，不要输出解析，不要解释思路。
2. 新样本必须自包含，不能依赖图片、文件、外部网页、历史对话、隐含上下文、未给出的背景事实或“见上文/见下图/联网查询”等信息。
3. 不能泄漏或复用原题答案、参考答案、判题结果、历史 assistant 回复、思维链或任何评测信息。
4. 若原样本是单轮任务，则新样本也必须保持为单轮任务。
5. 若原样本包含格式约束、答题方式约束、输入输出约束、代码补全范式、函数签名、样例格式或“只输出答案”等要求，应尽量保留。
6. 若原样本是开放问答、解释型任务、摘要型任务或分析型任务，新样本必须保持同类开放式任务，不得改成选择题、判断题或其他封闭式任务。
7. 若原样本包含代码、伪代码、函数接口、输入输出描述、样例或结构化约束，新样本应保留这种组织方式，但内容本身要实质变化。
8. 若新样本包含事实性内容，该内容必须满足以下之一：
   - 来自原样本中已给出的信息框架；
   - 不依赖具体外部事实也能自然成立；
   - 是常见、稳定、非冷门、无需检索即可回答的内容。
9. 不要为了“看起来不同”而引入冷门、偏门、拼凑感强、低频或不自然的设定。
10. 新样本应当自然、清晰、完整、可回答，并且足以支持高质量回答。
11. 若原样本本身存在噪声、冗余提示、错误推理、评测残留、无关元信息或低质量表达，新样本不要继承这些噪声，应只保留有效任务意图与必要风格特征。
12. 不要生成与原样本几乎等价的问题；不要只替换数字、实体名、变量名、地名、人名或语言表面形式。

多样性要求：
- 与原样本相比，优先改变以下至少一项：
  - 输入材料
  - 判断对象
  - 约束条件
  - 边界情况
  - 题面设定
  - 测试重点
  - 推理路径
  - 输出组织方式
- 但改变后仍要保持同类任务、同级难度、同类回答方式。

输出格式：
返回纯 JSON，不要输出额外文字。
{
  "items": [
    {
      "user": "...",
      "answer": "...",
      "meta": {}
    }
  ]
}

其中：
- items 必须恰好包含 {{variant_count}} 个对象
- 每个对象的 user 为新的 user prompt
- 每个对象的 answer 为该题标准答案本身，不要解释，不要推理，不要附加多余文字
- 每个对象的 meta 可为空对象

输出前自检：
- 这些新样本是否只是原样本改写？如果是，重写。
- 这些新样本是否泄漏了原答案、历史回复或评测信息？如果是，重写。
- 这些新样本是否需要外部信息才能回答？如果是，重写。
- 这些新样本是否改变了任务类型或答题方式？如果是，重写。
- 这些新样本是否遵循事实性原则？若包含事实性内容，是否来自原样本已给出的信息框架，或属于无需检索即可回答的常见稳定事实？如果不是，重写。
- 这些新样本是否自然、清晰、完整？如果不是，重写。

原始样本：
{{source_sample_json}}

已接受样本（新生成内容不要与这些重复）：
{{accepted_samples_json}}
{{feedback_block}}
'''

[validation]
template = '''
你是训练样本质检器，当前 profile 为 {{profile_name}}。

返回纯 JSON：
{"items":[{"index":0,"valid":true,"reason":"..."}]}

要求：
1. items 长度必须与候选样本数量一致。
2. 每项只能包含 index、valid、reason 三个字段。

只有同时满足以下条件时才判 valid=true：
1. 与原样本保持同一任务类型、语言风格和难度层级。
2. 若原样本是开放式任务，候选样本也必须保持为开放式任务，不得改成选择题、判断题或其他封闭式任务。
3. 不是简单同义改写或表面改写。
4. 新样本与原样本相关但本质不同。
5. 新样本是自包含的，不依赖外部检索、图片、历史上下文或隐藏前提。
6. 候选中的 answer 必须非空，并且是这道题的标准答案本身，不要解释，不要推理。
7. 新样本本身是一个 user prompt，而不是 assistant answer。
8. 候选样本本身清晰、自然，不是低质量、冷门或明显拼凑的特例。
9. 若包含事实性内容，必须来自原样本的信息框架，或属于常见、稳定、无需检索即可回答的内容。

不通过时，reason 只写最关键的失败原因，例如：
表述改写 / 与原任务本质相同 / 任务类型改变 / 需要外部知识 / 不是 user prompt / 低质量拼接 / 事实性风险

原始样本：
{{source_sample_json}}

候选样本：
{{generated_candidates_json}}
'''
