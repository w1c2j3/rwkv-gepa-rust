[input]
local_jsonl_path = "data-worry.json"
# limit = 10
start_index = 0
default_subject = "general"
sample_id_prefix = "sample"
sample_id_paths = ["context.document_id", "context.segment_id"]
sample_id_joiner = "#"
subject_paths = ["context.lp", "context.domain"]
subject_joiner = "/"
prompt_paths = ["context.translation_prompt"]
ref_answer_path = "context.reference_target"
prompt_joiner = "\n\n"

[generator]
model = "gpt-5.4-pro-2026-03-05"
base_url = "https://api.ablai.top/v1"
api_key = ""
question_count = 12
parse_retry_times = 2
enable_thinking = false

[[answer_models]]
name = "qwen3-30b-a3b-thinking-2507"
base_url = "https://api.ablai.top/v1"
api_key = ""
enable_thinking = true

[[answer_models]]
name = "gemini-2.5-flash-thinking"
base_url = "https://api.ablai.top/v1"
api_key = ""
enable_thinking = true

[[answer_models]]
name = "kimi-k2-thinking"
base_url = "https://api.ablai.top/v1"
api_key = ""
enable_thinking = true

[[answer_models]]
name = "qwen3-next-80b-a3b-thinking"
base_url = "https://api.ablai.top/v1"
api_key = "sP"
enable_thinking = true

[output]
jsonl = "data/rwkv_train.jsonl"

[run]
resume = true
request_timeout_seconds = 120
max_retries = 3
retry_backoff_seconds = 2
disable_env_proxy = false
force_http1 = true

[concurrency]
# 0 means "use current job count"
generator_requests = 0
answer_requests = 0
