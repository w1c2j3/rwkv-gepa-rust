[input]
local_jsonl_path = "data-worry.json"
limit = 10
start_index = 0
default_subject = "general"
sample_id_prefix = "sample"
sample_id_paths = ["context.document_id", "context.segment_id"]
sample_id_joiner = "#"
subject_paths = ["context.lp", "context.domain"]
subject_joiner = "/"
prompt_paths = ["context.translation_prompt"]
ref_answer_path = "context.reference_target"
prompt_joiner = "\n\n"

[generator]
model = "gpt-5.4"
base_url = "https://api.ablai.top/v1"
api_key_env = "RWKV_GEPA_API_KEY"
question_count = 10
enable_thinking = false

[[answer_models]]
name = "qwen3-30b-a3b-thinking-2507"
base_url = "https://api.ablai.top/v1"
api_key_env = "RWKV_GEPA_API_KEY"
enable_thinking = true

[[answer_models]]
name = "gemini-2.5-flash-thinking"
base_url = "https://api.ablai.top/v1"
api_key_env = "RWKV_GEPA_API_KEY"
enable_thinking = true

[[answer_models]]
name = "kimi-k2-thinking"
base_url = "https://api.ablai.top/v1"
api_key_env = "RWKV_GEPA_API_KEY"
enable_thinking = true

[[answer_models]]
name = "qwen3-next-80b-a3b-thinking"
base_url = "https://api.ablai.top/v1"
api_key_env = "RWKV_GEPA_API_KEY"
enable_thinking = true

[output]
jsonl = "data/rwkv_train.jsonl"

[run]
resume = true
request_timeout_seconds = 240
disable_env_proxy = true
force_http1 = true

[concurrency]
generator_requests = 8
answer_requests = 32
