[input]
dataset_path = "cmmlu_task122_failed_contexts.jsonl"
limit = 10
start_index = 0
default_subject = "cmmlu/task122"

[prompt]
profile_path = "prompts/multiple_choice.toml"

[generator]
endpoint = "https://api.example.com/v1/chat/completions"
model_name = "generator-model"
api_key = "YOUR_GENERATOR_API_KEY"
variant_count = 6
generation_attempts = 10
validate_generated_questions = true
json_object_response = false
validator_json_object_response = true
max_completion_tokens = 4096

[validator]
endpoint = "https://api.example.com/v1/chat/completions"
model_name = "validator-model"
api_key = "YOUR_VALIDATOR_API_KEY"
json_object_response = true
max_completion_tokens = 1024

[[answer_models]]
endpoint = "https://api.example.com/v1/chat/completions"
model_name = "answer-model"
api_key = "YOUR_ANSWER_API_KEY"
max_completion_tokens = 512

[output]
jsonl_path = "data/rwkv_train.jsonl"

[run]
resume = true
answer_generated = true
request_timeout_seconds = 240
disable_env_proxy = true
force_http1 = true

[concurrency]
generate_requests = 4
answer_requests = 16
