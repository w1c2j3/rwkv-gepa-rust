name = "general_task"

[generation]
template = '''
你要基于给定的原始 user prompt，生成 {{variant_count}} 条新的高质量训练样本。

核心目标：
生成“同领域近邻最小对比题/任务”。新样本看起来应当与原样本非常相关、题型一致、领域一致、问法相近，但必须通过改变少量关键条件，让标准答案、期望输出、关键结论或解法路径发生明确变化。

先在内部识别原样本的任务指纹，不要输出这一步：
1. 学科领域与细分场景，例如畜禽孵化、作物栽培、病虫害防治、法律条文适用、代码边界条件、函数实现、调试修复、SQL 查询、算法设计等。
2. 答案决定维度，例如阶段、对象、温度、浓度、时间、阈值、条件组合、边界情况、定义适用范围、输入约束、接口契约、错误条件、复杂度目标、测试用例。
3. 原题的选项结构、答题格式、语言风格和难度。
4. 识别原正确答案/期望输出/关键结论时，优先使用原始样本 meta.ref_answer；如果 meta.answer 与 meta.ref_answer 冲突，meta.answer 通常是历史模型错误答案或失败记录，不要当成标准答案。只有在 meta.ref_answer 缺失时，才谨慎参考 meta.answer。
5. 新样本的 answer 必须尽量与原正确答案/期望输出/关键结论不同，并且不同新样本之间也尽量分散。

高质量样本标准：
1. 领域必须贴近原样本的细分场景，不要只保持“大类相似”。
   - 如果原样本是鸡蛋孵化/育雏温度，不要跳到细胞培养、酶反应、面包发酵、普通实验室温度。
   - 如果原样本是某个法律条款适用，不要跳到另一个法域或无关制度。
   - 如果原样本是某类代码边界条件，不要跳到无关算法题。
2. 表面变化要小：优先只改变 1-2 个“答案决定条件”，例如对象、阶段、阈值、限定条件、适用场景、边界值、比较关系、输入约束、接口要求、错误处理规则或性能要求。
3. 本质变化要硬：改变后的条件必须足以让正确答案、期望输出、关键结论或解法路径发生变化；不能只是换实体名、换数字、换语序或同义改写。
4. 不要把非决定性背景条件当作 changed_factor。只有当某个条件在该领域标准知识中确实会改变标准答案时，才可以改它。
   - 例如如果题目中的“环境温度/地点/描述性背景”并不直接决定设备设定值，不要只改这个背景来强行改变答案。
   - 优先修改真正决定答案的专业条件，例如孵化对象、孵化阶段、出雏阶段、日龄阶段、设备类型、适用制度、边界输入等。
   - 如果原题是制度、定义、分类或归因题，不要只保持同一主题却跳到相邻章节考点；应尽量保持同一答案决定维度，例如仍考计税依据、仍考分布判定指标、仍考同一类技术归因。
   - 如果原题答案是精确数值、温度、浓度、时间或标准参数，只有在你确信新对象的新数值是常见稳定知识时才输出；不要为了换答案编造相近小数值。
5. 正确答案应与原样本完全不同。若原题 meta.ref_answer 中有原参考答案，新样本应优先让 answer 与 meta.ref_answer 不同；单选题优先换到不同选项字母。若因选项重排或新选项内容导致字母相同，该字母对应的正确选项文本也必须与原题 ref_answer 对应选项明显不同。不要只做到“不同于 meta.answer”却仍复用 meta.ref_answer 对应的正确答案内容。
6. 只有在你确信答案正确且属于常见稳定知识时才输出该样本。不要为了满足“答案不同”而编造一个不确定的数值、标准或事实。
7. 若是选择题，选项必须都合理、同量纲、同粒度、相互有区分度；错误选项要像真实干扰项，不能明显荒谬。
8. 新样本必须自包含，不依赖图片、文件、外部网页、历史对话、隐藏上下文、未给出的背景事实或联网查询。
9. 不要泄漏或复用原题答案、参考答案、判题结果、历史 assistant 回复、思维链或评测信息到 user 字段。
10. 若原样本是单轮任务，新样本也必须是单轮任务。
11. 若原样本包含格式约束、答题方式约束、选项结构、样例格式或“只输出答案”等要求，新样本必须保留。
12. 如果原样本是多项选择题，新样本也必须保持为多项选择题，并保留清晰题干和候选选项结构。
13. 如果原样本是代码题，新样本也必须保持为代码题，并保留同一任务类型：
   - 实现题仍是实现题，调试题仍是调试题，解释题仍是解释题，SQL 题仍是 SQL 题，算法题仍是算法题。
   - 保留语言、函数签名、输入输出风格、约束表达和样例组织方式，除非 changed_factor 明确是接口约束变化。
   - 优先改边界条件、异常处理、排序/去重规则、包含/排除关系、索引基准、稳定性要求、复杂度目标或一个关键输入约束。
   - answer 应给出新的标准输出、关键修复点、完整代码、SQL、复杂度结论或最终答案，具体格式必须匹配原题要求。
   - 不要凭空引入大型依赖、外部文件、网络请求、数据库 schema 或未给出的框架上下文。
14. 若原样本本身存在噪声、冗余提示、错误推理、评测残留、无关元信息或低质量表达，新样本不要继承这些噪声，只保留有效任务意图与必要风格。
15. 事实性内容必须是常见、稳定、可自洽的内容；不要引入冷门、偏门、拼凑感强或需要检索才知道的事实。
16. 对制度/定义/分类题，优先做同一考点内的最小条件变化；把“计税依据”改成“税率形式/制度目的/课税对象”这类相邻考点，通常属于考点漂移。

推荐生成策略：
- 优先做“最小条件翻转”：
  - 改阶段：孵化期、出雏期、育雏第1周、后续降温阶段等。
  - 改对象：同一细分场景内的相近对象，而不是跨到远领域。
  - 改边界：把问法从“最适温度”改为“过高/过低/某阶段适宜值/设备设定值”等。
  - 改条件组合：保留主体和选项形式，只改变一个关键前提，使答案转移。
  - 改代码边界：空输入、重复元素、闭区间/开区间、大小写敏感、排序稳定性、溢出、错误返回、None/null 处理。
  - 改代码契约：返回值从计数变为索引、从首次匹配变为全部匹配、从原地修改变为返回新集合、从忽略非法输入变为报错。
- 不要做“伪翻转”：
  - 只改环境背景但答案标准并不会变。
  - 只改选项顺序但题目本身没有本质变化。
  - 只把正确答案换成另一个字母但专业事实不成立。
  - 生成模型自己也不能稳定判断答案的冷门事实。
- 每条新样本都应能解释为：只改了一个关键条件，所以答案从原题的某选项转到另一选项。
- 对代码题，每条新样本都应能解释为：只改了一个关键约束，所以测试用例、标准输出、关键修复点或实现逻辑发生变化。
- 如果生成后发现正确答案仍可能与原题相同，重写该样本。
- 如果新题离开了原细分领域，重写该样本。
- 如果唯一能想到的变化是不确定或伪翻转，宁可生成更保守但确定的近邻题。

输出格式：
返回纯 JSON，不要输出额外文字。
{
  "items": [
    {
      "user": "...",
      "answer": "...",
      "meta": {
        "changed_factor": "...",
        "answer_shift": "different_from_original"
      }
    }
  ]
}

其中：
- items 必须恰好包含 {{variant_count}} 个对象。
- 每个对象的 user 为新的 user prompt，不能包含 assistant 答案或解析。
- 每个对象的 answer 为该题标准答案本身；如果原题要求单个选项字母，则 answer 只写单个大写选项字母；如果原题是代码题，则 answer 按原题期望输出完整代码、补丁要点、SQL、最终输出或结论。
- meta.changed_factor 用很短短语说明改变了哪个答案决定条件，不要写推理过程。
- meta.answer_shift 固定写 "different_from_original"；这里的 original 指原题参考正确答案，优先是 meta.ref_answer。如果你无法让答案与原题不同，必须重写，不要输出该样本。

输出前逐条自检：
1. 是否仍在原样本的细分领域？如果不是，重写。
2. changed_factor 是否是真正答案决定条件，而不是背景噪声？如果不是，重写。
3. 是否只改变少量关键条件，但这些条件会导致答案、输出或解法变化？如果不是，重写。
4. 正确答案是否与原题参考答案尽量不同，并且符合原题格式？如果 meta.ref_answer 存在，新 answer 是否避免仍等于 ref_answer？如果不是，重写。
5. 你是否确信该答案是常见稳定事实？如果不确信，重写。
6. 是否只是同义改写、换实体名、换数字或表面改写？如果是，重写。
7. 是否泄漏原答案、历史回复、评测信息或思维链到 user？如果是，重写。
8. 是否需要外部检索或隐藏上下文？如果是，重写。
9. 是否自然、清晰、完整、可回答？如果不是，重写。

原始样本：
{{source_sample_json}}

已接受样本（新生成内容不要与这些重复，也不要复用它们的 changed_factor）：
{{accepted_samples_json}}
{{feedback_block}}
'''

[validation]
template = '''
你是训练样本质检器，当前 profile 为 {{profile_name}}。

返回纯 JSON：
{"items":[{"index":0,"valid":true,"reason":"..."}]}

要求：
1. items 长度必须与候选样本数量一致。
2. 每项只能包含 index、valid、reason 三个字段。
3. reason 只写最关键的通过/失败原因，不要写长推理。

只有同时满足以下条件时才判 valid=true：
1. 与原样本保持同一任务类型、语言风格、难度层级和作答方式。
2. 与原样本保持同一细分领域和近邻场景；不能只保持宽泛大类相似。
3. 候选样本必须保持原题型：选择题仍是选择题，代码实现/调试/解释/SQL/算法题仍保持对应任务类型。
4. 若原样本是多项选择题，候选样本也必须是多项选择题，并保留合理选项结构。
5. 若原样本是代码题，候选样本必须保留语言、接口、输入输出风格和约束表达，除非 changed_factor 明确改变接口契约。
6. 候选样本只改变少量答案决定条件，例如阶段、对象、阈值、边界条件、限定条件、输入约束、接口契约或错误处理规则。
7. changed_factor 必须是真正答案决定条件；如果只是改环境背景、选项顺序、实体表面名称或无关限定，判 invalid。
8. 改变后的条件必须足以让正确答案、期望输出或解法路径不同于原题；若看起来仍会相同，判 invalid。
9. 原始样本 meta.ref_answer 是原题参考正确答案；如果 meta.answer 与 meta.ref_answer 冲突，meta.answer 视为历史错误答案或失败记录。候选 answer 不能只避开 meta.answer 却仍复用 meta.ref_answer 对应的正确答案内容；若候选 answer 字母等于 meta.ref_answer，但该字母的选项文本已经变成不同正确答案，可判为通过，否则判 invalid。
10. 候选中的 answer 必须非空，且是这道题的标准答案本身；单选题应尽量只给单个选项字母，代码题必须符合原题要求的答案格式。
11. answer 必须是稳定、可验证、可自洽的；如果像为了让答案不同而编造或硬凑，判 invalid。
12. 若是选择题，选项必须同量纲、同粒度、合理且唯一正确。
13. 对制度、定义、分类、归因题，候选必须保持同一考点维度；如果只是同主题但换成相邻考点，例如从计税依据跳到税率形式、制度目的或课税对象，判 invalid。
14. 对精确数值、温度、浓度、时间、标准参数题，候选答案必须是常见稳定事实；可疑小数值、拼凑参数或无法确信的数值判 invalid。
15. 新样本不是简单同义改写、表面改写、换实体名、换数字或机械扰动。
16. 新样本自包含，不依赖外部检索、图片、历史上下文或隐藏前提。
17. 新样本不能泄漏原答案、历史 assistant 回复、评测信息或思维链。
18. 候选样本清晰、自然、稳定，不是低质量、冷门或明显拼凑的特例。

不通过时，reason 只写最关键失败原因，例如：
领域漂移 / 考点漂移 / 答案未改变 / 答案等于ref_answer / 输出未改变 / 解法未改变 / changed_factor非决定条件 / 只是表面改写 / 任务类型改变 / 代码接口不一致 / 需要外部知识 / 不是 user prompt / 选项结构异常 / 正确答案不唯一 / 事实性风险 / 低质量拼接

原始样本：
{{source_sample_json}}

候选样本：
{{generated_candidates_json}}
'''
