[mmlu]
dataset_name = "cais/mmlu"
subset = "all"
split = "test"
rows_api_url = "https://datasets-server.huggingface.co/rows"
# local_jsonl_path = "fixtures/source_questions.sample.jsonl"
limit = 100
start_index = 400

[rewrite]
model = "gpt-5.4"
base_url = "https://api.example.com/v1"
api_key = "YOUR_API_KEY"
variant_count = 12
parse_retry_times = 2
enable_thinking = false
reasoning_effort = "medium"

[answer]
# 兼容旧版字段，真正的并发优先看 [concurrency]

[[answer_models]]
name = "qwen3-235b-a22b-thinking-2507"
base_url = "https://api.example.com/v1"
api_key = "YOUR_API_KEY"

[[answer_models]]
name = "MiniMax-M2.5"
base_url = "https://api.example.com/v1"
api_key = "YOUR_API_KEY"

[[answer_models]]
name = "glm-4.7"
base_url = "https://api.example.com/v1"
api_key = "YOUR_API_KEY"

[[answer_models]]
name = "kimi-k2.5"
base_url = "https://api.example.com/v1"
api_key = "YOUR_API_KEY"
enable_thinking = true

[output]
dir = "data"
original_jsonl = "data/mmlu_original.jsonl"
variants_jsonl = "data/mmlu_variants.jsonl"
responses_jsonl = "data/mmlu_responses.jsonl"

[run]
resume = true
request_timeout_seconds = 120
max_retries = 3
retry_backoff_seconds = 2

[concurrency]
dataset_requests = 4
dataset_page_size = 128
rewrite_requests = 8
answer_requests = 32
original_writer_capacity = 256
variant_writer_capacity = 1024
response_writer_capacity = 2048
http_max_idle_per_host = 64

[runtime]
worker_threads = 8
max_blocking_threads = 64
