name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Unit Tests
        run: cargo test
      - name: Export Smoke Test
        run: cargo run -- export --input fixtures/mmlu_variants.sample.jsonl --output /tmp/rust-v1-ci.parquet
      - name: Zero-Limit Synthesize Smoke Test
        run: |
          sed 's/limit = 100/limit = 0/' config.toml > /tmp/rust-v1-zero.toml
          cargo run -- synthesize --config /tmp/rust-v1-zero.toml
